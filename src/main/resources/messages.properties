####Validation Annotations####
validation.not_empty.message=This field must not be empty.
validation.not_null.message=This field must not be empty.
validation.not_blank.message=This field is required and cannot be empty.
validation.fix_size.message=The size must be {min} characters.
validation.size.message=Size must be between {min} and {max} characters.
validation.max_size.message=The size must be less than or equal to {value} characters.
validation.min_value.message=The value must be greater than or equal to {value}.
validation.password.too_short=The password is too short.

####Exceptions####
exception.generic.server_internal_error=An unexpected error occurred. Please try again later.
exception.security.change_password_mismatch=The current password provided doesn't match your stored password.
exception.validation.failed.message=Incorrect or invalid data.
exception.json.request_malformed=Malformed JSON request: The provided JSON is not valid. Please check the format and try again.
exception.invalid_enum_value.message=The value ''{0}'' is invalid; it must be one of the following values: {1} (case-insensitive).
exception.generic.type_mismatch=Type mismatch: Expected type is '{0}'.
